// ── Additional Questions for larger pool
// Each test: QR (21Q/45min) + VR (23Q/45min) + DI (20Q/45min) = 64Q / 135min
// Score range: 205–805
function generateMockTests() {
  const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
  const tests = [];

  for (let i = 1; i <= 10; i++) {
    const qPool = shuffle([...QUESTION_BANK.quant]);
    const vPool = shuffle([...QUESTION_BANK.verbal]);
    const dPool = shuffle([...QUESTION_BANK.dataInsights]);

    tests.push({
      id: i,
      name: `GMAT Focus Mock Test ${i}`,
      duration: 135, // 2 hours 15 minutes
      scoreRange: "205–805",
      sections: [
        {
          id: "quant",
          name: "Quantitative Reasoning",
          subtitle: "Algebra & Arithmetic",
          duration: 45,
          questions: qPool.slice(0, 21).map((q, idx) => ({
            ...q,
            id: `t${i}_q${idx + 1}`,
            baseId: q.id
          }))
        },
        {
          id: "verbal",
          name: "Verbal Reasoning",
          subtitle: "Critical Reasoning & Reading Comprehension",
          duration: 45,
          questions: vPool.slice(0, 23).map((q, idx) => ({
            ...q,
            id: `t${i}_v${idx + 1}`,
            baseId: q.id
          }))
        },
        {
          id: "dataInsights",
          name: "Data Insights",
          subtitle: "DS, Table Analysis, MSR, Graphics, Two-Part",
          duration: 45,
          questions: dPool.slice(0, 20).map((q, idx) => ({
            ...q,
            id: `t${i}_d${idx + 1}`,
            baseId: q.id
          }))
        }
      ]
    });
  }
  return tests;
}

// ─── API Helper ────────────────────────────────────────────────────────────────
const API_BASE = "/.netlify/functions/api";

async function apiFetch(path, options = {}) {
  const token = localStorage.getItem("gmat_token");

  // Convert /auth → ?route=auth, /results?all=true → ?route=results&all=true
  const [pathname, qs] = path.split("?");
  const route = pathname.replace("/", "");
  const queryString = qs ? `route=${route}&${qs}` : `route=${route}`;

  // Append query params to DELETE url too
  const method = options.method || "GET";
  const hasBody = options.body;
  let url = `${API_BASE}?${queryString}`;

  // For DELETE with id param, keep it in query
  if (method === "DELETE" && path.includes("?id=")) {
    const id = path.split("?id=")[1];
    url = `${API_BASE}?route=${route}&id=${id}`;
  }

  let res;
  try {
    res = await fetch(url, {
      ...options,
      headers: {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...(options.headers || {}),
      },
    });
  } catch (e) {
    throw new Error("Cannot reach server. Check your internet connection.");
  }

  const contentType = res.headers.get("content-type") || "";
  if (!contentType.includes("application/json")) {
    throw new Error("API not reachable. Make sure Netlify functions are deployed and DATABASE_URL is set.");
  }

  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

// ─── Main App ──────────────────────────────────────────────────────────────────
function GmatApp() {
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem("gmat_user") || "null"); } catch { return null; }
  });
  const [view, setView] = useState(() => {
    const u = JSON.parse(localStorage.getItem("gmat_user") || "null");
    if (!u) return "register";
    return u.role === "admin" ? "admin" : "dashboard";
  });
  const [activeTest, setActiveTest] = useState(null);
  const [testResults, setTestResults] = useState([]);
  const [users, setUsers] = useState([]);
  const [allResults, setAllResults] = useState([]);
  const [notification, setNotification] = useState(null);
  const [loadingResults, setLoadingResults] = useState(false);

  const showNotif = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3500);
  };

  // Load current user's results from Neon on mount / login
  useEffect(() => {
    if (!currentUser) return;
    setLoadingResults(true);
    apiFetch("/results")
      .then(data => {
        setTestResults(data);
        setLoadingResults(false);
      })
      .catch(() => setLoadingResults(false));
  }, [currentUser?.id]);

  // Admin: load all results + all users
  useEffect(() => {
    if (currentUser?.role !== "admin") return;
    apiFetch("/results?all=true").then(setAllResults).catch(() => {});
    apiFetch("/users").then(setUsers).catch(() => {});
  }, [currentUser?.role]);

  const login = async (email, password, name, isRegister) => {
    try {
      const data = await apiFetch("/auth", {
        method: "POST",
        body: JSON.stringify({ action: isRegister ? "register" : "login", email, password, name }),
      });
      localStorage.setItem("gmat_token", data.token);
      localStorage.setItem("gmat_user", JSON.stringify(data.user));
      setCurrentUser(data.user);
      setView(data.user.role === "admin" ? "admin" : "dashboard");
      showNotif(`Welcome${isRegister ? "" : " back"}, ${data.user.name}! 🎉`);
    } catch (e) {
      showNotif(e.message || "Login failed. Please try again.", "error");
    }
  };

  const logout = () => {
    localStorage.removeItem("gmat_token");
    localStorage.removeItem("gmat_user");
    setCurrentUser(null);
    setTestResults([]);
    setAllResults([]);
    setView("register");
  };

  const submitTest = async (result) => {
    try {
      const saved = await apiFetch("/results", {
        method: "POST",
        body: JSON.stringify({
          testId: result.testId,
          testName: result.testName,
          totalScore: result.totalScore,
          accuracy: result.accuracy,
          timeTaken: result.timeTaken,
          quantScore: result.quantScore,
          verbalScore: result.verbalScore,
          diScore: result.diScore,
          answers: result.answers,
          sectionStats: result.sectionScores,
        }),
      });
      // Merge full result data (including questions for review)
      const fullResult = { ...saved, ...result, date: saved.date };
      setTestResults(prev => [...prev, fullResult]);
      if (currentUser.role === "admin") setAllResults(prev => [...prev, fullResult]);
      setActiveTest(null);
      setView("review");
      showNotif("Test submitted & saved to database! 🎯");
      return fullResult;
    } catch (e) {
      // Fallback: save locally if API unavailable
      const fallback = { ...result, userId: currentUser.id, userName: currentUser.name, date: new Date().toISOString() };
      setTestResults(prev => [...prev, fallback]);
      setActiveTest(null);
      setView("review");
      showNotif("⚠️ Saved locally (DB unavailable). Check DATABASE_URL.", "error");
      return fallback;
    }
  };

function RegisterView({ onRegisterSuccess }) {
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [goLogin, setGoLogin] = useState(false);

  if (goLogin) return <LoginView onLogin={onRegisterSuccess} startOnLogin={true} />;

  const handleRegister = async () => {
    setError("");
    if (!name.trim()) { setError("Please enter your full name."); return; }
    if (!email.trim()) { setError("Please enter your email."); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters."); return; }
    if (password !== confirm) { setError("Passwords do not match."); return; }
    setLoading(true);

      await onRegisterSuccess(email, password, name, true);

      setError(e.message || "Registration failed.");

    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, background: "linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #eff6ff 100%)" }}>

              <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 2 }}>Completed</div>
            </div>
          </div>
        )}
      </div>

      {/* Test Cards Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 20 }}>
        {tests.map(test => {
          const result = results.find(r => r.testId === test.id);
          const isCompleted = !!result;
          
          return (
            <div key={test.id} className="card" style={{ position: "relative", overflow: "hidden", transition: "border-color 0.2s", borderColor: isCompleted ? "#2563eb" : "#e2e8f0" }}>
              {/* Test number watermark */}
              <div style={{ position: "absolute", right: -10, top: -10, fontSize: 100, color: "rgba(37,99,235,0.06)", fontWeight: 900, lineHeight: 1 }}>
                {test.id}
              </div>
              
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", fontWeight: 600, letterSpacing: 1, marginBottom: 6, textTransform: "uppercase" }}>
                    GMAT Focus Edition · Mock {test.id}
                  </div>
                  <h3 style={{ fontSize: 20, color: "#1a2340", fontWeight: 700 }}>{test.name}</h3>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b", marginTop: 4 }}>
                    64 Questions · 2hr 15min · Score 205–805
                  </div>
                </div>
                {isCompleted && (
                  <div style={{ background: "rgba(39,174,96,0.15)", border: "1px solid rgba(39,174,96,0.3)", borderRadius: 20, padding: "4px 10px" }}>
                    <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#27ae60", fontWeight: 600 }}>✓ Done</span>
                  </div>
                )}
              </div>

              {/* Sections */}
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 20 }}>
                {test.sections.map(s => (
                  <div key={s.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 12px", background: "#f8faff", borderRadius: 6, border: "1px solid #e2e8f0" }}>
                    <div>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#1a2340" }}>{s.name}</div>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8" }}>{s.subtitle}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#2563eb", fontWeight: 700 }}>{s.questions.length}Q</div>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8" }}>{s.duration}min</div>
                    </div>
                  </div>
                ))}
              </div>

              {/* Score if completed */}
              {isCompleted && (
                <div style={{ marginBottom: 16, padding: "12px 16px", background: "#eff6ff", borderRadius: 6, border: "1px solid #e0f2fe" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>SCORE</div>
                      <div style={{ fontSize: 24, color: "#2563eb", fontWeight: 700 }}>{result.totalScore}<span style={{ fontSize: 14, color: "#94a3b8", fontFamily: "'Plus Jakarta Sans', sans-serif" }}>/805</span></div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>ACCURACY</div>
                      <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 18, fontWeight: 600, color: result.accuracy >= 70 ? "#27ae60" : result.accuracy >= 50 ? "#f39c12" : "#e74c3c" }}>
                        {result.accuracy}%
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <div style={{ display: "flex", gap: 10 }}>
                <button className="gmat-btn" style={{ flex: 1, padding: "10px" }}
                  onClick={() => { setActiveTest(test); setView("test"); }}>
                  {isCompleted ? "Retake Test" : "Start Test →"}
                </button>
                {isCompleted && (
                  <button className="gmat-btn outline" style={{ padding: "10px 14px" }} onClick={() => setView("review")}>
                    Review
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Test View ─────────────────────────────────────────────────────────────────
function TestView({ test, onSubmit, setView }) {
  const [started, setStarted] = useState(false);
  const [currentSection, setCurrentSection] = useState(0);
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [marked, setMarked] = useState(new Set());
  const [timeLeft, setTimeLeft] = useState(test.sections[0].duration * 60);
  const [showConfirm, setShowConfirm] = useState(false);
  const [sectionDone, setSectionDone] = useState(false);
  const [transitioning, setTransitioning] = useState(false);
  const [startTime] = useState(Date.now());
  const [isFullscreen, setIsFullscreen] = useState(false);

  const enterFullscreen = () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    setIsFullscreen(true);
  };

  const exitFullscreen = () => {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    setIsFullscreen(false);
  };

  useEffect(() => {
    const handler = () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        setIsFullscreen(false);
      }
    };
    document.addEventListener("fullscreenchange", handler);
    document.addEventListener("webkitfullscreenchange", handler);
    return () => {
      document.removeEventListener("fullscreenchange", handler);
      document.removeEventListener("webkitfullscreenchange", handler);
    };
  }, []);

  useEffect(() => {
    setCurrentQ(0);
    setSectionDone(false);
    setTransitioning(false);
    setTimeLeft(test.sections[currentSection].duration * 60);
  }, [currentSection]);

  useEffect(() => {
    if (transitioning) return;
    const timer = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timer); setSectionDone(true); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timer);
  }, [currentSection, transitioning]);

  const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,"0")}:${(s%60).toString().padStart(2,"0")}`;
  const selectAnswer = (qId, idx) => setAnswers(prev => ({ ...prev, [qId]: idx }));
  const toggleMark = (qId) => setMarked(prev => { const n = new Set(prev); n.has(qId) ? n.delete(qId) : n.add(qId); return n; });

  const handleNextSection = () => {
    if (currentSection < test.sections.length - 1) {
      setTransitioning(true);
      setCurrentQ(0);
      setTimeout(() => setCurrentSection(s => s + 1), 10);
    }
  };

  const handleSubmit = () => {
    let correct = 0, total = 0;
    const sectionScores = {};
    test.sections.forEach(sec => {
      let secCorrect = 0;
      sec.questions.forEach(q => {
        total++;
        if (answers[q.id] === q.correct) { correct++; secCorrect++; }
      });
      sectionScores[sec.id] = { correct: secCorrect, total: sec.questions.length };
    });
    const accuracy = Math.round((correct / total) * 100);
    const totalScore = Math.round(205 + (correct / total) * 600);
    const timeTaken = Math.round((Date.now() - startTime) / 60000);
    exitFullscreen();
    onSubmit({ testId: test.id, testName: test.name, answers, correct, total, accuracy, totalScore, timeTaken, sectionScores, questions: test.sections.flatMap(s => s.questions) });
  };

  const handleStartTest = () => { enterFullscreen(); setStarted(true); };

  const section = test.sections[currentSection];
  const safeQ = Math.min(currentQ, section.questions.length - 1);
  const question = section.questions[safeQ];
  const totalQ = section.questions.length;

  // ── INSTRUCTIONS SCREEN ─────────────────────────────────────────────────────
  if (!started) {
    return (
      <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #eff6ff 0%, #dbeafe 50%, #eff6ff 100%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div className="fade-in" style={{ maxWidth: 760, width: "100%" }}>

          <div style={{ textAlign: "center", marginBottom: 32 }}>
            <div style={{ width: 72, height: 72, borderRadius: 20, background: "linear-gradient(135deg, #2563eb, #1d4ed8)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", boxShadow: "0 8px 32px rgba(37,99,235,0.3)" }}>
              <span style={{ fontSize: 32, color: "white" }}>📝</span>
            </div>
            <h1 style={{ fontSize: 30, fontWeight: 800, color: "#1a2340", marginBottom: 6 }}>{test.name}</h1>
            <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b", fontSize: 15 }}>
              GMAT Focus Edition &nbsp;·&nbsp; 3 Sections &nbsp;·&nbsp; 64 Questions &nbsp;·&nbsp; 2 Hours 15 Minutes
            </p>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
            {test.sections.map((s, i) => {
              const icons = ["🔢", "📖", "📊"];
              const colors = ["#2563eb", "#7c3aed", "#0891b2"];
              return (
                <div key={s.id} className="card" style={{ textAlign: "center", borderTop: "3px solid " + colors[i], padding: 16 }}>
                  <div style={{ fontSize: 28, marginBottom: 8 }}>{icons[i]}</div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, fontSize: 13, color: colors[i], marginBottom: 4 }}>{s.name}</div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#64748b", marginBottom: 10 }}>{s.subtitle}</div>
                  <div style={{ display: "flex", justifyContent: "center", gap: 12 }}>
                    <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, fontWeight: 700, color: "#1a2340" }}>{s.questions.length}Q</span>
                    <span style={{ color: "#e2e8f0" }}>|</span>
                    <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, fontWeight: 700, color: "#1a2340" }}>{s.duration} min</span>
                  </div>
                </div>
              );
            })}
          </div>

          <div className="card" style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#1a2340", marginBottom: 16 }}>📋 Test Instructions</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[
                { icon: "⏱️", title: "Timed Sections", desc: "Each section has a 45-min timer. Time does not carry over." },
                { icon: "🔀", title: "Free Navigation", desc: "Move freely between questions within a section." },
                { icon: "⭐", title: "Mark for Review", desc: "Flag questions to revisit before submitting." },
                { icon: "📵", title: "No Going Back", desc: "Once you move to the next section, you cannot return." },
                { icon: "🖥️", title: "Fullscreen Mode", desc: "Test runs fullscreen for a distraction-free experience." },
                { icon: "📊", title: "Score: 205–805", desc: "Three sections scored equally. Results shown instantly." },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", gap: 12, padding: "12px 14px", background: "#f8faff", borderRadius: 8, border: "1px solid #e2e8f0" }}>
                  <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                  <div>
                    <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, fontSize: 13, color: "#1a2340", marginBottom: 2 }}>{item.title}</div>
                    <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="card" style={{ marginBottom: 28, padding: 16 }}>
            <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 700, color: "#1a2340", marginBottom: 12 }}>Question Palette Legend</div>
            <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
              {[
                { bg: "#2563eb", border: "#2563eb", color: "#fff", label: "Current" },
                { bg: "#dcfce7", border: "#86efac", color: "#475569", label: "Answered" },
                { bg: "#fef3c7", border: "#f39c12", color: "#475569", label: "Marked for Review" },
                { bg: "#f1f5f9", border: "#e2e8f0", color: "#475569", label: "Not Attempted" },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 26, height: 26, borderRadius: 4, background: item.bg, border: "2px solid " + item.border, color: item.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700 }}>1</div>
                  <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{item.label}</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
            <button className="gmat-btn outline" style={{ padding: "12px 28px" }} onClick={() => setView("dashboard")}>← Back</button>
            <button className="gmat-btn" style={{ padding: "14px 48px", fontSize: 16, boxShadow: "0 8px 24px rgba(37,99,235,0.35)" }} onClick={handleStartTest}>
              🚀 Start Test in Fullscreen
            </button>
          </div>
          <p style={{ textAlign: "center", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#94a3b8", marginTop: 12 }}>
            The test will open in fullscreen for the best exam experience
          </p>
        </div>
      </div>
    );
  }

  // ── TEST SCREEN ──────────────────────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#f0f4ff" }}>

      {/* Sticky Top Bar */}
      <div style={{ background: "#1a2340", padding: "0 24px", height: 56, display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 6, background: "linear-gradient(135deg, #2563eb, #1d4ed8)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <span style={{ fontSize: 14, color: "white" }}>◈</span>
            </div>
            <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 800, fontSize: 15, color: "white" }}>GMAT Pro</span>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {test.sections.map((s, i) => (
              <span key={s.id} style={{
                fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, padding: "4px 10px",
                borderRadius: 20, fontWeight: 700,
                background: i === currentSection ? "#2563eb" : i < currentSection ? "#16a34a" : "rgba(255,255,255,0.1)",
                color: "white", border: "none"
              }}>
                {i < currentSection ? "✓ " : ""}{s.name}
              </span>
            ))}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 24, fontWeight: 800, color: timeLeft < 300 ? "#ef4444" : "#60a5fa", animation: timeLeft < 60 ? "pulse 1s infinite" : "none", minWidth: 90, textAlign: "center" }}>
            ⏱ {formatTime(timeLeft)}
          </div>
          {!isFullscreen && (
            <button onClick={enterFullscreen} style={{ background: "#2563eb", color: "white", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, cursor: "pointer" }}>
              ⛶ Fullscreen
            </button>
          )}
          <button onClick={() => setShowConfirm(true)} style={{ background: "#ef4444", color: "white", border: "none", borderRadius: 6, padding: "8px 16px", fontSize: 13, fontFamily: "'Plus Jakarta Sans', sans-serif", fontWeight: 700, cursor: "pointer" }}>
            Submit Test ✓
          </button>
        </div>
      </div>

      <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px" }}>

        {/* Section + Question Info */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, color: "#64748b" }}>
            <strong style={{ color: "#2563eb" }}>{section.name}</strong>
            <span style={{ margin: "0 8px", color: "#cbd5e1" }}>·</span>
            Question <strong style={{ color: "#1a2340" }}>{safeQ + 1}</strong> of <strong style={{ color: "#1a2340" }}>{totalQ}</strong>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {question && <span className={"badge " + question.difficulty.toLowerCase()}>{question.difficulty}</span>}
            {question && <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, padding: "3px 10px", borderRadius: 20, background: "#eff6ff", color: "#2563eb", border: "1px solid #bfdbfe", fontWeight: 600 }}>{question.type}</span>}
          </div>
        </div>

        {/* Progress Bar */}
        <div className="progress-bar" style={{ marginBottom: 20 }}>
          <div className="progress-fill" style={{ width: ((safeQ + 1) / totalQ * 100) + "%" }} />
        </div>

        {/* Question Card */}
        {!question ? (
          <div className="card" style={{ marginBottom: 20, textAlign: "center", padding: "40px", color: "#94a3b8" }}>Loading...</div>
        ) : (
          <div className="card" style={{ marginBottom: 20 }}>
            {question.passage && (
              <div style={{ padding: "14px 16px", background: "#f8faff", borderRadius: 8, marginBottom: 20, borderLeft: "3px solid #3b82f6" }}>
                <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, lineHeight: 1.75, color: "#334155" }}>{question.passage}</p>
              </div>
            )}
            <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 15, lineHeight: 1.7, marginBottom: 24, fontWeight: 600, color: "#1a2340" }}>
              {question.question2 || question.question}
            </p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {question.options.map((opt, idx) => {
                const isSelected = answers[question.id] === idx;
                return (
                  <div key={idx} onClick={() => selectAnswer(question.id, idx)} style={{
                    padding: "13px 16px", borderRadius: 8, cursor: "pointer", transition: "all 0.15s",
                    border: "1.5px solid " + (isSelected ? "#2563eb" : "#e2e8f0"),
                    background: isSelected ? "rgba(37,99,235,0.07)" : "#fafbff",
                    display: "flex", gap: 12, alignItems: "flex-start"
                  }}>
                    <span style={{
                      fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, fontWeight: 800,
                      width: 26, height: 26, borderRadius: "50%", flexShrink: 0,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      background: isSelected ? "#2563eb" : "#e2e8f0",
                      color: isSelected ? "#ffffff" : "#64748b"
                    }}>{String.fromCharCode(65 + idx)}</span>
                    <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, lineHeight: 1.6, color: isSelected ? "#1a2340" : "#475569" }}>{opt}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Navigation */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", gap: 8 }}>
            <button className="gmat-btn outline" style={{ padding: "8px 16px", fontSize: 13 }} onClick={() => question && toggleMark(question.id)}>
              {question && marked.has(question.id) ? "★ Marked" : "☆ Mark for Review"}
            </button>
            {safeQ > 0 && (
              <button className="gmat-btn outline" style={{ padding: "8px 16px", fontSize: 13 }} onClick={() => setCurrentQ(q => q - 1)}>← Prev</button>
            )}
          </div>

          {/* Question Palette */}
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap", justifyContent: "center", maxWidth: 400 }}>
            {section.questions.map((q, i) => (
              <div key={i} onClick={() => setCurrentQ(i)} style={{
                width: 28, height: 28, borderRadius: 4, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, fontWeight: 700,
                background: i === safeQ ? "#2563eb" : answers[q.id] !== undefined ? "#dcfce7" : "#f1f5f9",
                border: "1.5px solid " + (i === safeQ ? "#2563eb" : marked.has(q.id) ? "#f39c12" : answers[q.id] !== undefined ? "#86efac" : "#e2e8f0"),
                color: i === safeQ ? "#fff" : "#475569"
              }}>{i + 1}</div>
            ))}
          </div>

          <div>
            {safeQ < totalQ - 1 ? (
              <button className="gmat-btn" style={{ padding: "10px 20px", fontSize: 13 }} onClick={() => setCurrentQ(q => q + 1)}>Next →</button>
            ) : currentSection < test.sections.length - 1 ? (
              <button className="gmat-btn" style={{ padding: "10px 20px", fontSize: 13 }} onClick={handleNextSection}>Next Section →</button>
            ) : (
              <button className="gmat-btn" style={{ padding: "10px 20px", fontSize: 13 }} onClick={() => setShowConfirm(true)}>Submit Test ✓</button>
            )}
          </div>
        </div>
      </div>

      {/* Confirm Modal */}
      {showConfirm && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }}>
          <div className="card" style={{ width: 420, textAlign: "center", padding: 36 }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>📋</div>
            <h3 style={{ fontSize: 22, fontWeight: 800, color: "#1a2340", marginBottom: 8 }}>Submit Test?</h3>
            <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b", fontSize: 14, marginBottom: 12 }}>
              Answered <strong style={{ color: "#2563eb" }}>{Object.keys(answers).length}</strong> of <strong>{test.sections.reduce((s, sec) => s + sec.questions.length, 0)}</strong> questions
            </p>
            {Object.keys(answers).length < test.sections.reduce((s, sec) => s + sec.questions.length, 0) && (
              <div style={{ background: "#fef3c7", border: "1px solid #fcd34d", borderRadius: 8, padding: "10px 16px", marginBottom: 8 }}>
                <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#d97706", fontSize: 13, fontWeight: 600 }}>
                  ⚠️ {test.sections.reduce((s, sec) => s + sec.questions.length, 0) - Object.keys(answers).length} questions unanswered
                </p>
              </div>
            )}
            <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
              <button className="gmat-btn outline" style={{ flex: 1 }} onClick={() => setShowConfirm(false)}>← Continue Test</button>
              <button className="gmat-btn danger" style={{ flex: 1 }} onClick={handleSubmit}>Submit Final ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Analytics ─────────────────────────────────────────────────────────────────
function AnalyticsView({ results }) {
  if (results.length === 0) {
    return (
      <div className="fade-in" style={{ maxWidth: 700, margin: "80px auto", textAlign: "center", padding: "0 24px" }}>
        <div style={{ fontSize: 60, marginBottom: 20, opacity: 0.3 }}>📊</div>
        <h2 style={{ fontSize: 28, marginBottom: 12 }}>No Data Yet</h2>
        <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b" }}>Complete at least one mock test to see your analytics.</p>
      </div>
    );
  }

  const avgScore = Math.round(results.reduce((sum, r) => sum + r.totalScore, 0) / results.length);
  const bestScore = Math.max(...results.map(r => r.totalScore));
  const avgAccuracy = Math.round(results.reduce((sum, r) => sum + r.accuracy, 0) / results.length);
  
  const sectionData = { quant: { correct: 0, total: 0 }, verbal: { correct: 0, total: 0 }, dataInsights: { correct: 0, total: 0 } };
  results.forEach(r => {
    Object.entries(r.sectionScores || {}).forEach(([sec, data]) => {
      if (sectionData[sec]) {
        sectionData[sec].correct += data.correct;
        sectionData[sec].total += data.total;
      }
    });
  });

  const typeAcc = {};
  results.forEach(r => {
    (r.questions || []).forEach(q => {
      if (!typeAcc[q.type]) typeAcc[q.type] = { correct: 0, total: 0 };
      typeAcc[q.type].total++;
      if (r.answers[q.id] === q.correct) typeAcc[q.type].correct++;
    });
  });

  return (
    <div className="fade-in" style={{ maxWidth: 1100, margin: "0 auto", padding: "40px 24px" }}>
      <h1 style={{ fontSize: 36, marginBottom: 8 }}>Performance <span style={{ color: "#2563eb", fontStyle: "italic" }}>Analytics</span></h1>
      <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b", marginBottom: 36 }}>Based on {results.length} test{results.length > 1 ? "s" : ""} completed</p>

      {/* Key Metrics */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 16, marginBottom: 32 }}>
        {[
          { label: "Average Score", value: avgScore, suffix: "/805", color: "#2563eb" },
          { label: "Best Score", value: bestScore, suffix: "/805", color: "#27ae60" },
          { label: "Avg. Accuracy", value: avgAccuracy + "%", color: "#3498db" },
          { label: "Tests Completed", value: results.length, color: "#9b59b6" },
        ].map(m => (
          <div key={m.label} className="card" style={{ textAlign: "center" }}>
            <div style={{ fontSize: 32, fontWeight: 700, color: m.color, marginBottom: 4 }}>
              {m.value}{m.suffix || ""}
            </div>
            <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b", textTransform: "uppercase", letterSpacing: 0.5 }}>{m.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        {/* Score Trend */}
        <div className="card">
          <h3 style={{ fontSize: 18, marginBottom: 20 }}>Score Progression</h3>
          <div style={{ position: "relative", height: 160 }}>
            {results.map((r, i) => {
              const pct = ((r.totalScore - 205) / 600) * 100;
              const x = results.length === 1 ? 50 : (i / (results.length - 1)) * 90 + 5;
              const y = 100 - pct;
              return (
                <div key={i} style={{ position: "absolute", left: `${x}%`, top: `${y}%`, transform: "translate(-50%,-50%)" }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#2563eb", border: "2px solid #ffffff" }} />
                  <div style={{ position: "absolute", bottom: 14, left: "50%", transform: "translateX(-50%)", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", whiteSpace: "nowrap" }}>
                    {r.totalScore}
                  </div>
                </div>
              );
            })}
            {/* Y-axis labels */}
            {[805, 650, 450, 205].map(v => (
              <div key={v} style={{ position: "absolute", left: 0, top: `${100 - ((v - 205) / 600) * 100}%`, transform: "translateY(-50%)", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 10, color: "#cbd5e1" }}>
                {v}
              </div>
            ))}
            <div style={{ position: "absolute", inset: 0, border: "1px solid #e2e8f0", borderRadius: 4 }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
            {results.map((r, i) => (
              <span key={i} style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 10, color: "#cbd5e1" }}>T{r.testId}</span>
            ))}
          </div>
        </div>

        {/* Section Performance */}
        <div className="card">
          <h3 style={{ fontSize: 18, marginBottom: 20 }}>Section Performance</h3>
          {Object.entries(sectionData).map(([sec, data]) => {
            if (!data.total) return null;
            const pct = Math.round((data.correct / data.total) * 100);
            const labels = { quant: "Quantitative Reasoning", verbal: "Verbal Reasoning", dataInsights: "Data Insights" };
            const colors = { quant: "#2563eb", verbal: "#7c3aed", dataInsights: "#0891b2" };
            return (
              <div key={sec} style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#475569" }}>{labels[sec]}</span>
                  <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 600, color: colors[sec] }}>{pct}%</span>
                </div>
                <div className="progress-bar">
                  <div style={{ height: "100%", width: `${pct}%`, background: colors[sec], borderRadius: 3, transition: "width 1s" }} />
                </div>
                <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#cbd5e1", marginTop: 3 }}>
                  {data.correct}/{data.total} correct
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Question Type Analysis */}
      <div className="card">
        <h3 style={{ fontSize: 18, marginBottom: 20 }}>Performance by Question Type</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 16 }}>
          {Object.entries(typeAcc).map(([type, data]) => {
            const pct = Math.round((data.correct / data.total) * 100);
            return (
              <div key={type} style={{ padding: "16px", background: "#f8faff", borderRadius: 6, border: "1px solid #f1f5f9" }}>
                <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b", marginBottom: 8 }}>{type}</div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 22, fontWeight: 700, color: pct >= 70 ? "#27ae60" : pct >= 50 ? "#f39c12" : "#e74c3c" }}>
                    {pct}%
                  </div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#94a3b8" }}>
                    {data.correct}/{data.total}
                  </div>
                </div>
                <div className="progress-bar" style={{ marginTop: 8 }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: pct >= 70 ? "#27ae60" : pct >= 50 ? "#f39c12" : "#e74c3c", borderRadius: 3 }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Difficulty Analysis */}
      <div className="card" style={{ marginTop: 20 }}>
        <h3 style={{ fontSize: 18, marginBottom: 20 }}>Difficulty Breakdown</h3>
        {["Easy", "Medium", "Hard"].map(diff => {
          let correct = 0, total = 0;
          results.forEach(r => {
            (r.questions || []).forEach(q => {
              if (q.difficulty === diff) {
                total++;
                if (r.answers[q.id] === q.correct) correct++;
              }
            });
          });
          if (!total) return null;
          const pct = Math.round((correct / total) * 100);
          const colors = { Easy: "#27ae60", Medium: "#f39c12", Hard: "#e74c3c" };
          return (
            <div key={diff} style={{ display: "flex", alignItems: "center", gap: 16, marginBottom: 14 }}>
              <span className={`badge ${diff.toLowerCase()}`} style={{ width: 60, textAlign: "center" }}>{diff}</span>
              <div style={{ flex: 1 }}>
                <div className="progress-bar">
                  <div style={{ height: "100%", width: `${pct}%`, background: colors[diff], borderRadius: 3 }} />
                </div>
              </div>
              <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, fontWeight: 600, color: colors[diff], width: 40, textAlign: "right" }}>{pct}%</span>
              <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#94a3b8", width: 60 }}>{correct}/{total}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Review View ───────────────────────────────────────────────────────────────
function ReviewView({ results, tests }) {
  const [selectedResult, setSelectedResult] = useState(results[results.length - 1] || null);
  const [showExplain, setShowExplain] = useState({});

  if (results.length === 0) {
    return (
      <div className="fade-in" style={{ maxWidth: 700, margin: "80px auto", textAlign: "center", padding: "0 24px" }}>
        <div style={{ fontSize: 60, marginBottom: 20, opacity: 0.3 }}>📝</div>
        <h2 style={{ fontSize: 28, marginBottom: 12 }}>No Tests to Review</h2>
        <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b" }}>Complete a test first to review your answers.</p>
      </div>
    );
  }

  const toggleExplain = (id) => setShowExplain(prev => ({ ...prev, [id]: !prev[id] }));

  return (
    <div className="fade-in" style={{ maxWidth: 1000, margin: "0 auto", padding: "40px 24px" }}>
      <h1 style={{ fontSize: 36, marginBottom: 8 }}>Test <span style={{ color: "#2563eb", fontStyle: "italic" }}>Review</span></h1>
      
      {/* Result selector */}
      <div style={{ display: "flex", gap: 10, marginBottom: 28, flexWrap: "wrap" }}>
        {results.map((r, i) => (
          <button key={i}
            onClick={() => setSelectedResult(r)}
            style={{
              fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, padding: "8px 16px", borderRadius: 4,
              border: `1px solid ${selectedResult === r ? "#2563eb" : "#e2e8f0"}`,
              background: selectedResult === r ? "rgba(37,99,235,0.08)" : "transparent",
              color: selectedResult === r ? "#2563eb" : "#64748b", cursor: "pointer"
            }}>
            Test {r.testId} — {r.totalScore}
          </button>
        ))}
      </div>

      {selectedResult && (
        <>
          {/* Score summary */}
          <div className="card" style={{ marginBottom: 24, display: "flex", gap: 24, flexWrap: "wrap", alignItems: "center" }}>
            <div className="score-circle">
              <div style={{ fontSize: 28, fontWeight: 700, color: "#2563eb" }}>{selectedResult.totalScore}</div>
              <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8" }}>/ 800</div>
            </div>
            <div style={{ flex: 1 }}>
              <h3 style={{ fontSize: 20, marginBottom: 12 }}>{selectedResult.testName}</h3>
              <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
                <div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>ACCURACY</div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 20, fontWeight: 600, color: "#27ae60" }}>{selectedResult.accuracy}%</div></div>
                <div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>CORRECT</div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 20, fontWeight: 600 }}>{selectedResult.correct}/{selectedResult.total}</div></div>
                <div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>TIME</div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 20, fontWeight: 600 }}>{selectedResult.timeTaken}min</div></div>
                <div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8", marginBottom: 2 }}>DATE</div><div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, fontWeight: 600, color: "#64748b" }}>{new Date(selectedResult.date).toLocaleDateString()}</div></div>
              </div>
            </div>
          </div>

          {/* Questions review */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {(selectedResult.questions || []).map((q, i) => {
              const userAnswer = selectedResult.answers[q.id];
              const isCorrect = userAnswer === q.correct;
              const isUnanswered = userAnswer === undefined;
              
              return (
                <div key={i} className="card" style={{ borderColor: isUnanswered ? "#e2e8f0" : isCorrect ? "#86efac" : "#fca5a5" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#94a3b8" }}>Q{i + 1}</span>
                      <span className={`badge ${q.difficulty.toLowerCase()}`}>{q.difficulty}</span>
                      <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#94a3b8" }}>{q.type}</span>
                    </div>
                    <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 600, color: isUnanswered ? "#f39c12" : isCorrect ? "#27ae60" : "#e74c3c" }}>
                      {isUnanswered ? "Skipped" : isCorrect ? "✓ Correct" : "✗ Wrong"}
                    </span>
                  </div>
                  
                  {q.passage && (
                    <div style={{ padding: "10px 14px", background: "#f8faff", borderRadius: 4, marginBottom: 12, borderLeft: "2px solid #93c5fd", fontSize: 13, fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#4b5563", lineHeight: 1.6 }}>
                      {q.passage.length > 200 ? q.passage.slice(0, 200) + "..." : q.passage}
                    </div>
                  )}
                  
                  <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14, marginBottom: 14, lineHeight: 1.6 }}>{q.question}</p>
                  
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {q.options.map((opt, idx) => {
                      let bg = "transparent", border = "#e2e8f0", color = "#64748b";
                      if (idx === q.correct) { bg = "rgba(39,174,96,0.1)"; border = "rgba(39,174,96,0.4)"; color = "#27ae60"; }
                      else if (idx === userAnswer && !isCorrect) { bg = "rgba(231,76,60,0.1)"; border = "rgba(231,76,60,0.4)"; color = "#e74c3c"; }
                      return (
                        <div key={idx} style={{ padding: "10px 14px", borderRadius: 4, border: `1px solid ${border}`, background: bg, display: "flex", gap: 10, alignItems: "flex-start" }}>
                          <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, fontWeight: 700, color, flexShrink: 0 }}>{String.fromCharCode(65 + idx)}</span>
                          <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color, lineHeight: 1.5 }}>{opt}</span>
                          {idx === q.correct && <span style={{ marginLeft: "auto", flexShrink: 0, fontSize: 14 }}>✓</span>}
                          {idx === userAnswer && !isCorrect && <span style={{ marginLeft: "auto", flexShrink: 0, fontSize: 14 }}>✗</span>}
                        </div>
                      );
                    })}
                  </div>

                  {q.explanation && (
                    <div style={{ marginTop: 12 }}>
                      <button className="gmat-btn outline" style={{ padding: "6px 14px", fontSize: 12 }}
                        onClick={() => toggleExplain(q.id)}>
                        {showExplain[q.id] ? "Hide" : "Show"} Explanation
                      </button>
                      {showExplain[q.id] && (
                        <div style={{ marginTop: 10, padding: "14px 16px", background: "#eff6ff", borderRadius: 6, border: "1px solid #e0f2fe", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#334155", lineHeight: 1.7 }}>
                          <strong style={{ color: "#2563eb" }}>Explanation:</strong> {q.explanation}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  );
}

// ─── Admin View ────────────────────────────────────────────────────────────────
function AdminView({ users, allResults, tests, setUsers, showNotif, setView, setActiveTest }) {
  const [tab, setTab] = useState("overview");
  const [newUser, setNewUser] = useState({ name: "", email: "", password: "", role: "student" });
  const [savingUser, setSavingUser] = useState(false);

  const addUser = async () => {
    if (!newUser.name || !newUser.email || !newUser.password) {
      showNotif("Please fill all fields", "error"); return;
    }
    setSavingUser(true);
    try {
      const created = await apiFetch("/users", { method: "POST", body: JSON.stringify(newUser) });
      setUsers(prev => [...prev, created]);
      setNewUser({ name: "", email: "", password: "", role: "student" });
      showNotif("User added to Neon database! ✅");
    } catch (e) {
      showNotif(e.message || "Failed to add user", "error");
    }
    setSavingUser(false);
  };

  const deleteUser = async (id) => {
    try {
      await apiFetch(`/users?id=${id}`, { method: "DELETE" });
      setUsers(prev => prev.filter(u => u.id !== id));
      showNotif("User removed from database.");
    } catch (e) {
      showNotif(e.message || "Failed to remove user", "error");
    }
  };

  const totalAttempts = allResults.length;
  const avgPlatformScore = allResults.length > 0 ? Math.round(allResults.reduce((s, r) => s + r.totalScore, 0) / allResults.length) : 0;
  const students = users.filter(u => u.role === "student");

  return (
    <div className="fade-in" style={{ maxWidth: 1100, margin: "0 auto", padding: "40px 24px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 32 }}>
        <div>
          <h1 style={{ fontSize: 36, marginBottom: 4 }}>Admin <span style={{ color: "#2563eb", fontStyle: "italic" }}>Control Panel</span></h1>
          <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", color: "#64748b", fontSize: 14 }}>Platform management & analytics</p>
        </div>
      </div>

      {/* Tab Navigation */}
      <div style={{ display: "flex", gap: 4, marginBottom: 28, borderBottom: "1px solid #e2e8f0", paddingBottom: 0 }}>
        {["overview", "users", "tests", "results"].map(t => (
          <button key={t} onClick={() => setTab(t)}
            style={{
              fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, fontWeight: 600,
              padding: "10px 20px", border: "none", cursor: "pointer", background: "transparent",
              color: tab === t ? "#2563eb" : "#94a3b8",
              borderBottom: `2px solid ${tab === t ? "#2563eb" : "transparent"}`,
              transition: "all 0.2s", textTransform: "capitalize", marginBottom: -1
            }}>
            {t}
          </button>
        ))}
      </div>

      {/* Overview */}
      {tab === "overview" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16, marginBottom: 28 }}>
            {[
              { label: "Total Students", value: students.length, icon: "👥", color: "#3498db" },
              { label: "Total Attempts", value: totalAttempts, icon: "📝", color: "#27ae60" },
              { label: "Avg. Platform Score", value: avgPlatformScore || "N/A", icon: "📊", color: "#2563eb" },
              { label: "Total Tests", value: tests.length, icon: "🎯", color: "#9b59b6" },
            ].map(m => (
              <div key={m.label} className="card" style={{ display: "flex", alignItems: "center", gap: 16 }}>
                <div style={{ fontSize: 32 }}>{m.icon}</div>
                <div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 24, fontWeight: 700, color: m.color }}>{m.value}</div>
                  <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{m.label}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
            <div className="card">
              <h3 style={{ fontSize: 18, marginBottom: 16 }}>Test Completion Rate</h3>
              {tests.map(test => {
                const attempts = allResults.filter(r => r.testId === test.id).length;
                const pct = students.length > 0 ? Math.round((attempts / students.length) * 100) : 0;
                return (
                  <div key={test.id} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#475569" }}>Mock Test {test.id}</span>
                      <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#2563eb" }}>{attempts} attempts</span>
                    </div>
                    <div className="progress-bar">
                      <div className="progress-fill" style={{ width: `${pct}%` }} />
                    </div>
                  </div>
                );
              })}
            </div>

            <div className="card">
              <h3 style={{ fontSize: 18, marginBottom: 16 }}>Score Distribution</h3>
              {allResults.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 0", color: "#cbd5e1", fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 14 }}>
                  No test results yet
                </div>
              ) : (
                ["205-399", "400-549", "550-649", "650-805"].map(range => {
                  const [min, max] = range.split("-").map(Number);
                  const count = allResults.filter(r => r.totalScore >= min && r.totalScore <= max).length;
                  const pct = allResults.length > 0 ? Math.round((count / allResults.length) * 100) : 0;
                  const colors = ["#e74c3c", "#f39c12", "#3498db", "#27ae60"];
                  const idx = ["200-399", "400-549", "550-649", "650-800"].indexOf(range);
                  return (
                    <div key={range} style={{ marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                        <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: "#64748b" }}>{range}</span>
                        <span style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 12, color: colors[idx] }}>{count} ({pct}%)</span>
                      </div>
                      <div className="progress-bar">
                        <div style={{ height: "100%", width: `${pct}%`, background: colors[idx], borderRadius: 3 }} />
                      </div>
                    </div>
                  );
                })
              )}
            </div>
          </div>
        </div>
      )}

      {/* Users Tab */}
      {tab === "users" && (
        <div>
          <div className="card" style={{ marginBottom: 20 }}>
            <h3 style={{ fontSize: 18, marginBottom: 16 }}>Add New User</h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12 }}>
              <div>
                <label style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", display: "block", marginBottom: 6 }}>NAME</label>
                <input value={newUser.name} onChange={e => setNewUser(p => ({ ...p, name: e.target.value }))} placeholder="Full name" />
              </div>
              <div>
                <label style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", display: "block", marginBottom: 6 }}>EMAIL</label>
                <input value={newUser.email} onChange={e => setNewUser(p => ({ ...p, email: e.target.value }))} placeholder="email@example.com" />
              </div>
              <div>
                <label style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", display: "block", marginBottom: 6 }}>PASSWORD</label>
                <input type="password" value={newUser.password} onChange={e => setNewUser(p => ({ ...p, password: e.target.value }))} placeholder="Password" />
              </div>
              <div>
                <label style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 11, color: "#2563eb", display: "block", marginBottom: 6 }}>ROLE</label>
                <select value={newUser.role} onChange={e => setNewUser(p => ({ ...p, role: e.target.value }))}>
                  <option value="student">Student</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <button className="gmat-btn" style={{ marginTop: 16, opacity: savingUser ? 0.7 : 1 }} onClick={addUser} disabled={savingUser}>
              {savingUser ? "⏳ Saving to Neon..." : "Add User →"}
            </button>
          </div>

          <div className="card">
            <h3 style={{ fontSize: 18, marginBottom: 16 }}>All Users ({users.length})</h3>
            <table>
              <thead>
                <tr>
                  <th>Name</th><th>Email</th><th>Role</th><th>Join Date</th><th>Tests</th><th>Avg Score</th><th>Action</th>
                </tr>
              </thead>
              <tbody>
                {users.map(u => {
                  const userRes = allResults.filter(r => r.userId === u.id);
                  const avg = userRes.length > 0 ? Math.round(userRes.reduce((s, r) => s + r.totalScore, 0) / userRes.length) : "—";
                  return (
                    <tr key={u.id}>
                      <td style={{ fontWeight: 600 }}>{u.name}</td>
                      <td>{u.email}</td>
                      <td><span className={`badge ${u.role === "admin" ? "hard" : "easy"}`}>{u.role}</span></td>
                      <td>{u.joinDate}</td>
                      <td>{userRes.length}</td>
                      <td style={{ color: "#2563eb", fontWeight: 600 }}>{avg}</td>
                      <td>
                        {u.role !== "admin" && (
                          <button className="gmat-btn danger" style={{ padding: "4px 12px", fontSize: 11 }} onClick={() => deleteUser(u.id)}>Remove</button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Tests Tab */}
      {tab === "tests" && (
        <div className="card">
          <h3 style={{ fontSize: 18, marginBottom: 16 }}>Mock Test Management</h3>
          <table>
            <thead>
              <tr><th>Test</th><th>Sections</th><th>Total Questions</th><th>Duration</th><th>Attempts</th><th>Avg Score</th><th>Action</th></tr>
            </thead>
            <tbody>
              {tests.map(test => {
                const attempts = allResults.filter(r => r.testId === test.id);
                const avgSc = attempts.length > 0 ? Math.round(attempts.reduce((s, r) => s + r.totalScore, 0) / attempts.length) : "—";
                return (
                  <tr key={test.id}>
                    <td style={{ fontWeight: 600 }}>{test.name}</td>
                    <td>{test.sections.length}</td>
                    <td>{test.sections.reduce((s, sec) => s + sec.questions.length, 0)}</td>
                    <td>{test.duration} min</td>
                    <td>{attempts.length}</td>
                    <td style={{ color: "#2563eb", fontWeight: 600 }}>{avgSc}</td>
                    <td>
                      <button className="gmat-btn outline" style={{ padding: "4px 14px", fontSize: 11 }}
                        onClick={() => { setActiveTest(test); setView("test"); }}>
                        Preview →
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* Results Tab */}
      {tab === "results" && (
        <div className="card">
          <h3 style={{ fontSize: 18, marginBottom: 16 }}>All Test Results ({allResults.length})</h3>
          {allResults.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px", color: "#cbd5e1", fontFamily: "'Plus Jakarta Sans', sans-serif" }}>No results yet</div>
          ) : (
            <table>
              <thead>
                <tr><th>Student</th><th>Test</th><th>Score</th><th>Accuracy</th><th>Time</th><th>Date</th></tr>
              </thead>
              <tbody>
                {[...allResults].reverse().map((r, i) => (
                  <tr key={i}>
                    <td style={{ fontWeight: 600 }}>{r.userName}</td>
                    <td>{r.testName}</td>
                    <td style={{ color: "#2563eb", fontWeight: 700 }}>{r.totalScore}</td>
                    <td>
                      <span style={{ color: r.accuracy >= 70 ? "#27ae60" : r.accuracy >= 50 ? "#f39c12" : "#e74c3c", fontWeight: 600, fontFamily: "'Plus Jakarta Sans', sans-serif" }}>
                        {r.accuracy}%
                      </span>
                    </td>
                    <td>{r.timeTaken}min</td>
                    <td>{new Date(r.date).toLocaleDateString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      )}
    </div>
  );
}

                  </div>

                  {/* Key Points */}
                  <h4 style={{ fontSize: 12, fontWeight: 800, color: section.color, letterSpacing: 1, textTransform: "uppercase", marginBottom: 12 }}>Key Concepts</h4>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 12, marginBottom: 20 }}>
                    {topic.points.map((point, pi) => (
                      <div key={pi} style={{ background: "#f8faff", borderRadius: 10, padding: "14px 16px", border: "1px solid #e2e8f0" }}>
                        <div style={{ fontWeight: 700, fontSize: 13, color: "#1a2340", marginBottom: 5, display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ width: 6, height: 6, borderRadius: "50%", background: section.color, display: "inline-block", flexShrink: 0 }} />
                          {point.label}
                        </div>
                        <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#475569", lineHeight: 1.6 }}>{point.text}</p>
                      </div>
                    ))}
                  </div>

                  {/* Pro Tip */}
                  <div style={{ background: "linear-gradient(135deg, #fefce8, #fef9c3)", borderRadius: 10, padding: "14px 18px", border: "1px solid #fcd34d", display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <span style={{ fontSize: 18, flexShrink: 0 }}>💡</span>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 11, color: "#92400e", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Pro Tip</div>
                      <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#78350f", lineHeight: 1.6 }}>{topic.tip}</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Footer note */}
      <div style={{ marginTop: 32, textAlign: "center", padding: "20px", background: "#f8faff", borderRadius: 12, border: "1px solid #e2e8f0" }}>
        <p style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: 13, color: "#64748b" }}>
          💡 <strong>Study tip:</strong> Read one topic before attempting related questions in your mock tests. These notes align directly with the question types in your GMAT Focus Edition mocks.
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GmatApp />);
</script>
</body>
</html>
